apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vexobj.fullname" . }}
  labels:
    {{- include "vexobj.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "vexobj.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "vexobj.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: vexobj
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: VEXOBJ_CONFIG
              value: /etc/vexobj/config.toml
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          # /livez only asserts that the HTTP loop is up — a DB hiccup
          # must not trigger a pod kill. /readyz does the real check.
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/vexobj
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "vexobj.fullname" . }}-config
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "vexobj.fullname" . }}-data
        {{- else }}
        - name: data
          emptyDir: {}
        {{- end }}

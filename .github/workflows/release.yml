name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: vaultfs-linux-amd64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: vaultfs-macos-arm64.tar.gz
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      # Build the server and the admin CLI together — users expect both.
      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }} \
            --bin vaultfs --bin vaultfsctl

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} vaultfs vaultfsctl
          cd ../../../
          sha256sum ${{ matrix.archive }} > ${{ matrix.archive }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      # Consolidate per-file .sha256 files into a single SHA256SUMS, which
      # is the convention consumers expect to verify release artifacts.
      - name: Aggregate checksums
        run: cat *.sha256 > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            SHA256SUMS
          generate_release_notes: true

  docker:
    name: Docker
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
